---
- name: Create EC2 instance Windows Server 2022 in Tokyo region
  hosts: localhost
  gather_facts: no
  tasks:
    - name: Create EC2 instance
      amazon.aws.ec2_instance:
        name: windows-server-2022
        region: ap-northeast-1
        instance_type: t3.medium
        image_id: ami-0c1224ec973d29f5b
        key_name: keypair_oikawa
        security_group: default
        state: running
      register: ec2_result

    - name: Display instance details
      debug:
        msg: "Instance ID: {{ ec2_result.instance_ids[0] }}, State: {{ ec2_result.instances[0].state.name }}"