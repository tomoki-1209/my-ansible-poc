---
- name: Create EC2 instance with Windows Server 2022
  hosts: localhost
  gather_facts: no
  tasks:
    - name: Launch EC2 instance
      amazon.aws.ec2_instance:
        name: windows-server-2022
        image_id: ami-0c55b159cbfafe1f0
        instance_type: t3.medium
        key_name: default
        security_group: default
        state: running
      register: ec2_result

    - name: Display instance information
      debug:
        msg:
          - "Instance ID: {{ ec2_result.instances[0].instance_id }}"
          - "Instance State: {{ ec2_result.instances[0].state.name }}"
          - "Public IP: {{ ec2_result.instances[0].public_ip_address | default('Not assigned yet') }}"