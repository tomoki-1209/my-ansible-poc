---
- name: Create EC2 instance in Tokyo region
  hosts: localhost
  gather_facts: no
  tasks:
    - name: Create Windows Server 2022 EC2 instance in Tokyo
      amazon.aws.ec2_instance:
        region: ap-northeast-1
        image_id: ami-0bba69335379e17f8
        instance_type: t3.medium
        key_name: your-key-pair
        state: running
        security_group: default
        tags:
          Name: WindowsServer2022
      register: ec2_result

    - name: Display instance details
      debug:
        msg: |
          Instance ID: {{ ec2_result.instance_ids[0] }}
          Private IP: {{ ec2_result.instances[0].private_ip_address }}
          State: {{ ec2_result.instances[0].state.name }}