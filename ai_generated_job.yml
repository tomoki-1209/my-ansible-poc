---
- name: Get instances list with name and ID
  hosts: localhost
  gather_facts: no
  tasks:
    - name: Retrieve EC2 instances
      amazon.aws.ec2_instance_info:
      register: ec2_instances

    - name: Display instances with name and ID
      debug:
        msg: "Instance Name: {{ item.tags.Name | default('N/A') }}, Instance ID: {{ item.instance_id }}"
      loop: "{{ ec2_instances.instances }}"