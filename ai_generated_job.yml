---
- name: Check if users related to oikawa exist
  hosts: all
  tasks:
    - name: Get list of users
      getent:
        database: passwd
      register: passwd_data

    - name: Check for oikawa-related users
      debug:
        msg: "oikawa-related users found: {{ passwd_data.ansible_facts.getent_passwd.keys() | select('search', 'oikawa') | list }}"