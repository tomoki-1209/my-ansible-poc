---
- name: Get EC2 instances in Tokyo region
  hosts: localhost
  gather_facts: no
  tasks:
    - name: Describe EC2 instances in Tokyo region
      amazon.aws.ec2_instance_info:
        region: ap-northeast-1
      register: ec2_instances

    - name: Display instance ID and Name
      debug:
        msg: "Instance ID: {{ item.instance_id }}, Name: {{ item.tags.Name | default('N/A') }}"
      loop: "{{ ec2_instances.instances }}"
      loop_control:
        label: "{{ item.instance_id }}"