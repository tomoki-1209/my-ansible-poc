---
- hosts: all
  gather_facts: yes
  tasks:
    - name: Get current date and time
      set_fact:
        current_datetime: "{{ ansible_date_time.iso8601_basic_short }}"

    - name: Create Windows Server 2022 instance
      amazon.aws.ec2_instance:
        name: "WindowsServer2022-{{ current_datetime }}"
        instance_type: t3.medium
        image_id: ami-011fe16e2cdada577
        key_name: keypair_oikawa
        region: ap-northeast-1
        security_group: sg-073febbc6a28f598e
        tags:
          Name: "WindowsServer2022-{{ current_datetime }}"
          AWX-Managed: "True"
        user_data: |
          <powershell>
          $ErrorActionPreference = "Stop"
          
          # Set Administrator password
          $admin = [adsi]('WinNT://./Administrator, user')
          $admin.SetPassword("XieAwx0415")
          
          # Disable Windows Defender Firewall
          Set-NetFirewallProfile -Profile Domain, Public, Private -Enabled False
          
          # Enable WinRM
          Enable-PSRemoting -Force
          Set-Item WSMan:\localhost\Service\Auth\Basic -Value $true
          winrm set winrm/config/service/auth '@{Basic="true"}'
          
          # Create self-signed certificate for HTTPS
          $cert = New-SelfSignedCertificate -CertstoreLocation Cert:\LocalMachine\My -DnsName "*" -FriendlyName "Ansible" -NotAfter (Get-Date).AddYears(10)
          
          # Configure WinRM for HTTPS
          $params = @{
            ResourceUri = 'winrm/config/Listener'
            SelectorSet = @{ Transport = 'HTTPS'; Address = '*' }
            ValueSet = @{ CertificateThumbprint = $cert.Thumbprint }
          }
          New-WSManInstance @params
          </powershell>
        wait: yes
      register: ec2_instance

    - name: Display instance information
      debug:
        msg:
          - "Instance ID: {{ ec2_instance.instances[0].instance_id }}"
          - "Instance Name: {{ ec2_instance.instances[0].tags.Name }}"
          - "Private IP: {{ ec2_instance.instances[0].private_ip_address }}"
          - "Instance State: {{ ec2_instance.instances[0].state.name }}"