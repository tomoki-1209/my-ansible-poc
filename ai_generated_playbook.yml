---
- name: Get EC2 instances list
  hosts: localhost
  gather_facts: no
  tasks:
    - name: Retrieve all EC2 instances
      amazon.aws.ec2_instance_info:
      register: ec2_instances

    - name: Display EC2 instances
      debug:
        msg: "Instance ID: {{ item.instance_id }}, State: {{ item.state.name }}, Type: {{ item.instance_type }}, Name: {{ item.tags.Name | default('N/A') }}"
      loop: "{{ ec2_instances.instances }}"
      loop_control:
        label: "{{ item.instance_id }}"