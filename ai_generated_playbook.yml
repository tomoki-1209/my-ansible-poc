---
- hosts: 172.31.47.151
  gather_facts: yes
  tasks:
    - name: Change hostname to AWXTEST01
      win_hostname:
        name: AWXTEST01
      register: hostname_result

    - name: Reboot to apply hostname change
      win_reboot:
        msg: "Hostname change requires reboot"
        pre_reboot_delay: 2