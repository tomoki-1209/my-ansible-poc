---
- name: Create Windows Server 2022 Instance
  hosts: all
  gather_facts: false
  tasks:
    - name: Create EC2 instance
      amazon.aws.ec2_instance:
        name: windows-server-2022
        image_id: ami-011fe16e2cdada577
        instance_type: t3.medium
        key_name: keypair_oikawa
        region: ap-northeast-1
        tags:
          Name: windows-server-2022
        state: running
      register: instance_result

    - name: Display instance information
      debug:
        msg: "Instance {{ instance_result.instances[0].instance_id }} created successfully"