---
- hosts: all
  gather_facts: yes
  tasks:
    - name: Get current date and time
      set_fact:
        timestamp: "{{ ansible_date_time.strftime('%Y%m%d%H%M%S') }}"

    - name: Create Windows Server 2022 EC2 instance
      amazon.aws.ec2_instance:
        name: "WindowsServer2022-{{ timestamp }}"
        instance_type: t3.medium
        image_id: ami-011fe16e2cdada577
        region: ap-northeast-1
        key_name: keypair_oikawa
        security_group: sg-073febbc6a28f598e
        tags:
          AWX-Managed: "True"
        user_data: |
          <powershell>
          $ProgressPreference = "SilentlyContinue"
          $ErrorActionPreference = "Stop"
          
          # Set Administrator password
          $admin = [adsi]("WinNT://./Administrator")
          $admin.PSBase.Invoke("SetPassword", "XieAwx0415")
          
          # Enable WinRM
          Enable-PSRemoting -Force
          
          # Configure WinRM for Ansible
          Set-Item WSMan:\localhost\Service\Auth\Basic -Value $true
          Set-Item WSMan:\localhost\Service\AllowUnencrypted -Value $false
          Set-Item WSMan:\localhost\Config\MaxEnvelopeSizekb -Value 8192
          
          # Create self-signed certificate
          $thumbprint = (New-SelfSignedCertificate -DnsName $env:COMPUTERNAME -CertStoreLocation Cert:\LocalMachine\My -KeySpec KeyExchange).Thumbprint
          New-Item -Path WSMan:\LocalHost\Listener -Transport HTTPS -Address * -CertificateThumbPrint $thumbprint -Force
          
          # Configure WinRM listener
          winrm set winrm/config/service/auth '@{Basic="true"}'
          winrm set winrm/config/service '@{AllowUnencrypted="false"}'
          
          # Enable firewall rules for WinRM
          netsh advfirewall firewall add rule name="WinRM-HTTPS" dir=in action=allow protocol=tcp localport=5986
          
          # Disable Windows Defender Firewall
          Set-NetFirewallProfile -Profile Domain,Public,Private -Enabled False
          </powershell>
      register: ec2_result

    - name: Display instance details
      debug:
        msg:
          - "Instance ID: {{ ec2_result.instances[0].instance_id }}"
          - "Instance Name: {{ ec2_result.instances[0].tags.Name }}"
          - "Private IP: {{ ec2_result.instances[0].private_ip_address }}"