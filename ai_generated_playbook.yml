---
- hosts: localhost
  gather_facts: no
  tasks:
    - name: Get EC2 instances information
      amazon.aws.ec2_instance_info:
        region: ap-northeast-1
      register: ec2_info

    - name: Display EC2 instances details
      debug:
        msg: |
          Instance Name: {{ item.tags.Name | default('N/A') }}
          Private IP: {{ item.private_ip_address }}
          AMI ID: {{ item.image_id }}
      loop: "{{ ec2_info.instances }}"
      loop_control:
        label: "{{ item.tags.Name | default('N/A') }}"