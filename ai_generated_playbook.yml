---
- hosts: all
  gather_facts: no
  tasks:
    - name: Check if oikawa user exists in AWS IAM
      amazon.aws.iam_user_info:
        user_name: oikawa
      register: user_info
      ignore_errors: yes

    - name: Display user existence status
      debug:
        msg: "User 'oikawa' exists: {{ user_info.iam_users | length > 0 }}"