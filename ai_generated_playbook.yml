---
- name: Get EC2 instances
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Retrieve EC2 instances
      amazon.aws.ec2_instance_info:
      register: ec2_instances

    - name: Display EC2 instances
      debug:
        msg: "Instance ID: {{ item.instance_id }}, State: {{ item.state.name }}, Type: {{ item.instance_type }}, IP: {{ item.private_ip_address }}"
      loop: "{{ ec2_instances.instances }}"
      loop_control:
        label: "{{ item.instance_id }}"