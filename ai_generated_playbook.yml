---
- name: Get IAM Users List
  hosts: localhost
  gather_facts: false
  tasks:
    - name: List all IAM users
      amazon.aws.iam_user_info:
      register: iam_users

    - name: Display IAM users
      debug:
        msg: "{{ item.user_name }} (ARN: {{ item.arn }})"
      loop: "{{ iam_users.iam_users }}"
      loop_control:
        label: "{{ item.user_name }}"