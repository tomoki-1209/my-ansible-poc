---
- name: List IAM Users
  hosts: all
  gather_facts: no
  tasks:
    - name: Get all IAM users
      amazon.aws.iam_user_info:
      register: iam_users

    - name: Display IAM users
      debug:
        msg: "{{ item.user_name }} (Created: {{ item.create_date }})"
      loop: "{{ iam_users.iam_users }}"
      loop_control:
        label: "{{ item.user_name }}"