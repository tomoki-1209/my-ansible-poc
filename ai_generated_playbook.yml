---
- hosts: all
  vars:
    ansible_connection: winrm
    ansible_port: 5986
    ansible_winrm_server_cert_validation: ignore
    ansible_winrm_transport: basic
  tasks:
    - name: Get hostname
      win_shell: hostname
      register: hostname_result
      delegate_to: 172.31.43.44

    - name: Display hostname
      debug:
        msg: "{{ hostname_result.stdout_lines[0] }}"