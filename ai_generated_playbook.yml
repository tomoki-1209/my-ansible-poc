---
- hosts: all
  gather_facts: no
  tasks:
    - name: Get instance details
      amazon.aws.ec2_instance_info:
        instance_ids:
          - i-0ad6132d070d14d2f
        region: ap-northeast-1
      register: instance_info

    - name: Display IP address
      debug:
        msg: "Private IP: {{ instance_info.instances[0].private_ip_address }}, Public IP: {{ instance_info.instances[0].public_ip_address }}"