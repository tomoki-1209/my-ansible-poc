---
- name: Get private IP for EC2 instance
  hosts: all
  gather_facts: no
  tasks:
    - name: Retrieve EC2 instance information
      amazon.aws.ec2_instance_info:
        instance_ids:
          - i-0432bcc45a9a0e31e
        region: ap-northeast-1
      register: ec2_info

    - name: Display private IP address
      debug:
        msg: "Private IP: {{ ec2_info.instances[0].private_ip_address }}"