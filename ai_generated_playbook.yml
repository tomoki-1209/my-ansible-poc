---
- hosts: 172.31.47.151
  vars:
    ansible_connection: winrm
    ansible_port: 5986
    ansible_winrm_server_cert_validation: ignore
    ansible_winrm_transport: basic
  tasks:
    - name: Change hostname to AWXTEST01
      win_hostname:
        name: AWXTEST01
      register: hostname_result
    
    - name: Display hostname change result
      debug:
        msg: "Hostname changed: {{ hostname_result.reboot_required }}"