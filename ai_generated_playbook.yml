---
- name: Check IAM users related to Oikawa
  hosts: localhost
  gather_facts: false
  tasks:
    - name: List all IAM users
      amazon.aws.iam_user_info:
      register: iam_users_result

    - name: Filter and display Oikawa-related users
      debug:
        msg: "{{ item.user_name }}"
      loop: "{{ iam_users_result.iam_users }}"
      loop_control:
        label: "{{ item.user_name }}"
      when: "'oikawa' in item.user_name | lower"

    - name: Show summary
      debug:
        msg: "Found {{ filtered_users | length }} Oikawa-related IAM user(s)"
      vars:
        filtered_users: "{{ iam_users_result.iam_users | selectattr('user_name', 'search', 'oikawa', ignorecase=true) | list }}"