---
- name: Create Windows Server 2022 EC2 Instance
  hosts: all
  gather_facts: yes
  tasks:
    - name: Get current date and time
      set_fact:
        current_datetime: "{{ ansible_date_time.iso8601_basic_short }}"

    - name: Create Windows Server 2022 instance
      amazon.aws.ec2_instance:
        name: "WindowsServer2022-{{ current_datetime }}"
        instance_type: t3.medium
        image_id: ami-011fe16e2cdada577
        region: ap-northeast-1
        key_name: keypair_oikawa
        security_group_ids:
          - sg-073febbc6a28f598e
        user_data: |
          <powershell>
          # Configure Windows Remote Management for Ansible
          $ErrorActionPreference = "Stop"
          
          # Set Administrator password
          $adminPassword = "XieAwx0415"
          $adminUser = [ADSI]("WinNT://./Administrator")
          $adminUser.SetPassword($adminPassword)
          
          # Disable Windows Defender Firewall
          Set-NetFirewallProfile -Profile Domain,Public,Private -Enabled $false
          
          # Enable WinRM
          Enable-PSRemoting -Force
          
          # Create self-signed certificate
          $hostname = [System.Net.Dns]::GetHostName()
          $cert = New-SelfSignedCertificate -DnsName $hostname -CertStoreLocation Cert:\LocalMachine\My -Type SSLAuthenticationBinding
          
          # Configure WinRM HTTPS listener
          $thumbprint = $cert.Thumbprint
          Remove-Item -Path WSMan:\localhost\Listener\* -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -Path WSMan:\localhost\Listener -Transport HTTPS -Address * -CertificateThumbPrint $thumbprint -Force
          
          # Set WinRM configuration
          Set-Item -Path WSMan:\localhost\Service\Auth\Basic -Value $true
          Set-Item -Path WSMan:\localhost\Service\Auth\CredSSP -Value $true
          Set-Item -Path WSMan:\localhost\Service\AllowUnencrypted -Value $false
          
          # Restart WinRM service
          Restart-Service WinRM -Force
          </powershell>
        tags:
          Name: "WindowsServer2022-{{ current_datetime }}"
          Environment: "Development"
          CreatedBy: "Ansible"
      register: instance_result

    - name: Display instance details
      debug:
        msg: "Instance {{ instance_result.instances[0].tags.Name }} created with ID: {{ instance_result.instances[0].instance_id }}"