---
- hosts: 172.31.36.217
  gather_facts: no
  vars:
    ansible_connection: winrm
    ansible_port: 5986
    ansible_winrm_server_cert_validation: ignore
    ansible_winrm_transport: basic
    new_hostname: AWXTEST08
  tasks:
    - name: Get current hostname
      win_hostname:
        name: "{{ new_hostname }}"
      register: hostname_result

    - name: Reboot if hostname changed
      win_reboot:
        msg: "Hostname is being changed to {{ new_hostname }}"
        pre_reboot_delay: 2
      when: hostname_result.reboot_required | default(false)