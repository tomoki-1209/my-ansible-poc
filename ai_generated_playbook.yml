---
- hosts: 172.31.47.151
  vars:
    ansible_connection: winrm
    ansible_port: 5986
    ansible_winrm_server_cert_validation: ignore
    ansible_winrm_transport: basic
  tasks:
    - name: Change hostname to AWXTEST02
      win_hostname:
        name: AWXTEST02
      register: hostname_result

    - name: Reboot if hostname changed
      win_reboot:
        msg: "Hostname changed to AWXTEST02. Rebooting..."
        pre_reboot_delay: 5
      when: hostname_result.reboot_required | default(false)