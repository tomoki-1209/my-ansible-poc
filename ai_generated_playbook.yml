---
- name: Change Windows hostname
  hosts: 172.31.39.50
  vars:
    ansible_connection: winrm
    ansible_port: 5986
    ansible_winrm_server_cert_validation: ignore
    ansible_winrm_transport: basic
  tasks:
    - name: Get current hostname
      win_shell: hostname
      register: current_hostname
      changed_when: false

    - name: Change hostname to AWXTEST05
      win_hostname:
        name: AWXTEST05
      register: hostname_result
      when: current_hostname.stdout_lines[0] != 'AWXTEST05'

    - name: Reboot system
      win_reboot:
        msg: "Hostname changed, rebooting..."
        pre_reboot_delay: 15
      when: hostname_result is changed