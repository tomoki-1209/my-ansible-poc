---
- name: Get Private IP of EC2 Instance
  hosts: all
  gather_facts: false
  tasks:
    - name: Describe EC2 instance
      amazon.aws.ec2_instance_info:
        instance_ids:
          - i-0efff5fc4ba75e73
        region: ap-northeast-1
      register: ec2_info

    - name: Display private IP
      debug:
        msg: "Private IP: {{ ec2_info.instances[0].private_ip_address }}"