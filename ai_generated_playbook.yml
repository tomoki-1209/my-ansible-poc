---
- name: Get IAM user list
  hosts: all
  gather_facts: false
  tasks:
    - name: List all IAM users
      amazon.aws.iam_user_info:
      register: iam_users

    - name: Display user list
      debug:
        msg: "{{ item.user_name }}"
      loop: "{{ iam_users.iam_users }}"
      loop_control:
        label: "{{ item.user_name }}"