---
- name: Get private IP for EC2 instance
  hosts: all
  gather_facts: no
  tasks:
    - name: Get EC2 instance information
      amazon.aws.ec2_instance_info:
        instance_ids:
          - i-0816f19eda352b01b
        region: ap-northeast-1
      register: ec2_info

    - name: Display private IP
      debug:
        msg: "Private IP: {{ ec2_info.instances[0].private_ip_address }}"