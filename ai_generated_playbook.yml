---
- name: Get EC2 instances list
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Describe EC2 instances
      amazon.aws.ec2_instance_info:
        region: ap-northeast-1
      register: ec2_instances

    - name: Display EC2 instances
      debug:
        msg: |
          Instance ID: {{ item.instance_id }}
          State: {{ item.state.name }}
          Instance Type: {{ item.instance_type }}
          Private IP: {{ item.private_ip_address }}
          Public IP: {{ item.public_ip_address | default('N/A') }}
          Launch Time: {{ item.launch_time }}
      loop: "{{ ec2_instances.instances }}"
      loop_control:
        label: "{{ item.instance_id }}"