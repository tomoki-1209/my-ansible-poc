---
- name: Get EC2 instance IP address
  hosts: all
  gather_facts: no
  tasks:
    - name: Describe EC2 instance
      amazon.aws.ec2_instance_info:
        instance_ids:
          - i-0ad6132d070d14d2f
        region: ap-northeast-1
      register: instance_info

    - name: Display instance IP address
      debug:
        msg: "Instance {{ item.instance_id }}: Private IP = {{ item.private_ip_address }}, Public IP = {{ item.public_ip_address | default('None') }}"
      loop: "{{ instance_info.instances }}"
      loop_control:
        label: "{{ item.instance_id }}"