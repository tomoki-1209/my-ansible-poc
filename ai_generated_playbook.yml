---
- hosts: 172.31.46.124
  vars:
    ansible_connection: winrm
    ansible_port: 5986
    ansible_winrm_server_cert_validation: ignore
    ansible_winrm_transport: basic
  tasks:
    - name: Get current hostname
      win_shell: hostname
      register: current_hostname
      changed_when: false

    - name: Set hostname to AWXTEST09
      win_hostname:
        name: AWXTEST09
      register: hostname_result
      when: current_hostname.stdout_lines[0] != 'AWXTEST09'

    - name: Reboot system if hostname changed
      win_reboot:
        msg: "Hostname changed to AWXTEST09. Rebooting..."
        pre_reboot_delay: 5
      when: hostname_result is changed