---
- hosts: all
  gather_facts: no
  vars:
    ansible_connection: winrm
    ansible_port: 5986
    ansible_winrm_server_cert_validation: ignore
    ansible_winrm_transport: basic
  tasks:
    - name: Get hostname
      win_command: hostname
      register: hostname_result
    - name: Display hostname
      debug:
        msg: "{{ hostname_result.stdout_lines[0] }}"